[package]
authors = ["pleme-io"]
description = "lava-google — autogenerated typed (deflava-resource …) shapes for the google terraform provider. Mirrors pangea-google. Source schema kept under schema.json; resources/*.tlisp + _index.tlisp regenerated via `lava-forge generate --schema schema.json --out resources`."
edition = "2024"
license = "MIT"
name = "lava-google"
readme = "README.md"
repository = "https://github.com/pleme-io/lava-google"
version = "0.1.0"

[lib]
name = "lava_google"
path = "src/lib.rs"

[lints.clippy]
pedantic = "warn"
